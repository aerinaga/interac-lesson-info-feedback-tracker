<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERAC LESSON INFO FEEDBACK TRACKER</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <style>
    :root { --sky-top: #87CEEB; --sky-bottom: #E0F7FA; --pastel-pink: #FFB6C1; --light-pink: #FFC0CB; --black: #000000; }
    body { font-family: Helvetica, Arial, sans-serif; background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom)); min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; position: relative; }
    .cloud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .cloud { position: absolute; background-size: contain; background-repeat: no-repeat; animation: float 8s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .c1 { background-image: url('images/clouds1.png'); top: 5%; left: 5%; width: 250px; height: 150px; }
    .c2 { background-image: url('images/clouds2.png'); top: 10%; left: 75%; width: 200px; height: 120px; }
    .c3 { background-image: url('images/clouds3.png'); top: 30%; left: 20%; width: 280px; height: 160px; }
    .c4 { background-image: url('images/clouds4.png'); top: 50%; left: 60%; width: 220px; height: 130px; }
    .c5 { background-image: url('images/clouds5.png'); top: 65%; left: 10%; width: 180px; height: 110px; }
    .c6 { background-image: url('images/clouds6.png'); top: 80%; left: 80%; width: 260px; height: 150px; }
    .c7 { background-image: url('images/clouds7.png'); top: 20%; left: 40%; width: 150px; height: 90px; }
    .c8 { background-image: url('images/clouds8.png'); top: 85%; left: 35%; width: 300px; height: 180px; }
    .container { max-width: 1100px; margin: auto; text-align: center; position: relative; z-index: 2; }
    .anya-dance { position: fixed; bottom: 0; right: 0px; width: 200px; z-index: 1000; pointer-events: none; }
    .header-img { width: 100%; max-width: 350px; margin-bottom: 10px; }
    h2 { color: var(--light-pink); text-transform: uppercase; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; margin: 10px 0; }
    .search-area { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    input { padding: 10px; border: 2px solid var(--black); border-radius: 8px; width: 250px; }
    button { padding: 10px 20px; background-color: var(--pastel-pink); border: 2px solid var(--black); border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    /* Transparent Compact Table */
    table { width: 100%; border-collapse: collapse; background-color: rgba(255, 255, 255, 0.7); border: 2px solid var(--black); font-size: 0.9em; backdrop-filter: blur(4px); }
    th { background-color: rgba(255, 182, 193, 0.8); padding: 8px; border: 1px solid var(--black); text-transform: uppercase; }
    td { padding: 8px; border: 1px solid rgba(0, 0, 0, 0.1); text-align: center; }
    
    @keyframes flyLeftToRight { 0% { left: -150px; } 100% { left: 105vw; } }
    @keyframes flyRightToLeft { 0% { left: 105vw; } 100% { left: -150px; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    .flying-img { position: absolute; width: 100px; z-index: 1; pointer-events: none; animation: flyLeftToRight 15s linear infinite, bounce 2s ease-in-out infinite; }
    .fly-reverse { animation: flyRightToLeft 15s linear infinite, bounce 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="cloud-layer"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div><div class="cloud c5"></div><div class="cloud c6"></div><div class="cloud c7"></div><div class="cloud c8"></div></div>
  <img src="images/Anya_dance.gif" class="anya-dance" alt="Anya dancing">
  <img src="images/57.png" class="flying-img" style="top: 10%; animation-duration: 15s;">
  <img src="images/58.png" class="flying-img" style="top: 25%; animation-duration: 12s; animation-delay: -4s;">
  <img src="images/59.png" class="flying-img fly-reverse" style="top: 40%; animation-duration: 18s; animation-delay: -8s;">
  <img src="images/60.png" class="flying-img fly-reverse" style="top: 55%; animation-duration: 14s; animation-delay: -2s;">
  <img src="images/61.png" class="flying-img fly-reverse" style="top: 70%; animation-duration: 16s; animation-delay: -6s;">
  <div class="container">
    <img src="images/31.png" class="header-img">
    <h2>INTERAC LESSON INFO FEEDBACK TRACKER</h2>
    <div class="search-area">
      <input type="text" id="q" placeholder="Enter Teacher Name">
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="resultsTable"></div>
  </div>
  <script>
    async function doSearch() {
      const q = document.getElementById('q').value;
      const tableDiv = document.getElementById('resultsTable');
      if (!q) { Toastify({ text: "Please enter a name!", backgroundColor: "#FFB6C1" }).showToast(); return; }
      const url = 'https://script.google.com/macros/s/AKfycby5wCWuRe-4B5nNRxuXSRatGtEbV_s-hnzEVzPHgLYvHRNw52tSDe9BXaQvfNPMdKzFIQ/exec?q=' + encodeURIComponent(q);
      tableDiv.innerHTML = "Loading...";
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (!data.rows || data.rows.length === 0) { tableDiv.innerHTML = "No results found."; return; }
        let html = '<table><thead><tr><th>Date</th><th>Access</th><th>Start</th><th>End</th><th>Type</th><th>Area</th><th>Grade</th><th>Class</th><th>Period</th><th>Student</th><th>Teacher</th><th>Material</th><th>FB Form</th></tr></thead><tbody>';
        data.rows.forEach(r => {
          const fbLink = r[12] ? `<a href="${r[12]}" target="_blank">Open</a>` : "#N/A";
          html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td><td>${r[11]}</td><td>${fbLink}</td></tr>`;
        });
        tableDiv.innerHTML = html + '</tbody></table>';
      } catch (e) { Toastify({ text: "Error", backgroundColor: "#FF6347" }).showToast(); }
    }
  </script>
</body>
</html>
