<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERAC LESSON INFO FEEDBACK TRACKER</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <style>
    :root { --sky-top: #87CEEB; --sky-bottom: #E0F7FA; --pastel-pink: #FFB6C1; --light-pink: #FFC0CB; --black: #000000; }
    body { font-family: Helvetica, Arial, sans-serif; background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom)); min-height: 100vh; margin: 0; padding: 40px 20px; }
    .container { max-width: 1200px; margin: auto; text-align: center; }
    
    /* Bigger Table Styles */
    table { width: 100%; border-collapse: collapse; background: white; border: 3px solid var(--black); font-size: 1.2em; }
    th { background-color: var(--pastel-pink); padding: 20px; border: 2px solid var(--black); text-transform: uppercase; }
    td { padding: 20px; border: 2px solid #ddd; text-align: center; }
    
    .search-area { margin-bottom: 30px; }
    input { padding: 15px; font-size: 1.2em; border: 3px solid var(--black); border-radius: 8px; width: 350px; }
    button { padding: 15px 30px; font-size: 1.2em; background-color: var(--pastel-pink); border: 3px solid var(--black); border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>INTERAC LESSON INFO FEEDBACK TRACKER</h2>
    <div class="search-area">
      <input type="text" id="q" placeholder="Enter Teacher Name">
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="resultsTable"></div>
  </div>

  <script>
    async function doSearch() {
      const q = document.getElementById('q').value;
      const tableDiv = document.getElementById('resultsTable');
      if (!q) { Toastify({ text: "Please enter a name!", backgroundColor: "#FFB6C1" }).showToast(); return; }
      
      const url = 'https://script.google.com/macros/s/AKfycbzXmsul9G0-SAnWBy74USm7_w5HXzdjvldmOH9Wc_SPnbiy1G-0WN6BYDkV1yI9oFBK_g/exec?q=' + encodeURIComponent(q);
      
      tableDiv.innerHTML = "Loading...";
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (!data.rows || data.rows.length === 0) { tableDiv.innerHTML = "No results found."; return; }
        
        let html = '<table><thead><tr><th>Date</th><th>Access</th><th>Start</th><th>End</th><th>Type</th><th>Area</th><th>Grade</th><th>Class</th><th>Period</th><th>Student</th><th>Teacher</th><th>Material</th><th>FB Form</th></tr></thead><tbody>';
        data.rows.forEach(r => {
          // If URL (r[12]) is empty, show #N/A, otherwise show Open link
          const fbLink = r[12] ? `<a href="${r[12]}" target="_blank">Open</a>` : "#N/A";
          html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td><td>${r[11]}</td><td>${fbLink}</td></tr>`;
        });
        tableDiv.innerHTML = html + '</tbody></table>';
      } catch (e) { Toastify({ text: "Error fetching data", backgroundColor: "#FF6347" }).showToast(); }
    }
  </script>
</body>
</html>
