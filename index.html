<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERAC LESSON INFO FEEDBACK TRACKER</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Toastify CDN -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    :root {
      --primary-blue: #1a73e8;
      --interac-gold: #fbbc04;
      --interac-gold-dark: #d1a302;
      --bg-color: #f0f2f5;
      --success-green: #28a745;
      --gray-muted: #555; 
      --line-color: #e0e0e0;
    }
    html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Inter', sans-serif; }
    .container { width: 100%; min-height: 100vh; background: white; display: flex; flex-direction: column; box-sizing: border-box; }
    .header-section { padding: 20px; background: white; border-bottom: 1px solid #eee; text-align: center; }
    .header-section h2 { color: var(--primary-blue); margin: 0 0 5px 0; font-size: 24px; font-weight: 800; }
    .date-note { font-size: 13px; color: #666; margin-bottom: 20px; font-weight: 500; }
    .search-area { display: flex; justify-content: center; gap: 10px; padding-bottom: 10px; }
    input[type="text"] { padding: 12px 16px; width: 100%; max-width: 450px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    button { padding: 0 30px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .table-wrapper { flex-grow: 1; overflow: auto; position: relative; }
    table { width: 100%; border-collapse: collapse; min-width: 1500px; }
    th { background-color: var(--interac-gold); padding: 12px 10px; font-weight: 800; text-transform: uppercase; color: #000; border-bottom: 2px solid var(--interac-gold-dark); border-right: 1px solid var(--interac-gold-dark); position: sticky; top: 0; z-index: 10; font-size: 11px; letter-spacing: 0.05em; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; border-right: 1px solid var(--line-color); text-align: center; font-size: 12.5px; }
    .bold-col { font-weight: 700; color: #000; }
    .finished-row { background-color: #f2f2f2 !important; color: var(--gray-muted); }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .badge-upcoming { background: #e6ffed; color: var(--success-green); border: 1px solid #b7eb8f; }
    .badge-finished { background: #e0e0e0; color: #444; border: 1px solid #ccc; }
    .btn-link { background: var(--primary-blue); color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-block; text-transform: uppercase; cursor: pointer; border:none; }
    .raw-link { color: var(--primary-blue); text-decoration: underline; font-size: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-section">
      <h2>INTERAC LESSON INFO FEEDBACK TRACKER</h2>
      <div class="date-note" id="date-range-note">Displaying July 2026 Lessons</div>
      <div class="search-area">
        <input type="text" id="q" placeholder="Enter Teacher Name" onkeypress="if(event.key==='Enter') doSearch()">
        <button id="btn" onclick="doSearch()">Search</button>
      </div>
    </div>
    <div id="results-container" class="table-wrapper"><div id="results"></div></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwnHpSG4WJ-pwXfWATtrt42uCBdDGXaM9OAlZFQDAoLuakOtu-AJoFcv13W627onXf-Cw/exec";

    function showToast(message, color = "#1a73e8") {
      Toastify({ text: message, duration: 3000, gravity: "top", position: "right", style: { background: color, borderRadius: "8px" } }).showToast();
    }

    async function doSearch() {
      const q = document.getElementById('q').value.trim();
      if(!q) { showToast("Enter a teacher name", "#d93025"); return; }
      
      Swal.fire({ title: 'Searching...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const response = await fetch(`${WEB_APP_URL}?q=${encodeURIComponent(q)}`);
        const data = await response.json();
        if(!data.rows || data.rows.length === 0) {
          Swal.close();
          showToast("No lessons found", "#d93025");
          document.getElementById('results').innerHTML = "";
          return;
        }
        Swal.close();
        showToast(`Found ${data.rows.length} lessons`);
        render(data.rows);
      } catch (err) { Swal.close(); showToast("Connection Error", "#d93025"); }
    }

    function render(rows) {
      const headers = ["Status", "Date", "Access", "Start", "End", "Material", "Mat URL", "Meeting URL", "Teacher", "Student", "FB Form", "Type", "Area", "School", "Grade", "Class", "Period"];
      let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
      rows.forEach(r => {
        html += `<tr><td><span class="badge badge-upcoming">JULY</span></td>`;
        r.forEach((cell, i) => {
          let content = cell || "-";
          if (i === 9) { // FB Form
             html += `<td><a class="btn-link" href="${content}" target="_blank">Open</a></td>`;
          } else {
             html += `<td>${content}</td>`;
          }
        });
        html += '</tr>';
      });
      document.getElementById('results').innerHTML = html + '</tbody></table>';
    }
  </script>
</body>
</html>
