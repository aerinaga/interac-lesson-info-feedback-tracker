<!DOCTYPE html>

<head>

  <style>
    :root {
      --sky-top: #87CEEB;
      --sky-bottom: #E0F7FA;
      --pastel-pink: #FFB6C1;
      --light-pink: #FFC0CB;
      --black: #000000;
    }

    body { 
      font-family: Helvetica, Arial, sans-serif; 
      background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
      min-height: 100vh;
      margin: 0; padding: 40px 20px; 
      overflow-x: hidden; position: relative;
    }

    /* Cloud Background */
    .cloud-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .cloud { position: absolute; background-size: contain; background-repeat: no-repeat; animation: float 8s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    .c1 { background-image: url('images/clouds1.png'); top: 5%; left: 5%; width: 250px; height: 150px; }
    .c2 { background-image: url('images/clouds2.png'); top: 10%; left: 75%; width: 200px; height: 120px; }
    .c3 { background-image: url('images/clouds3.png'); top: 30%; left: 20%; width: 280px; height: 160px; }
    .c4 { background-image: url('images/clouds4.png'); top: 50%; left: 60%; width: 220px; height: 130px; }
    .c5 { background-image: url('images/clouds5.png'); top: 65%; left: 10%; width: 180px; height: 110px; }
    .c6 { background-image: url('images/clouds6.png'); top: 80%; left: 80%; width: 260px; height: 150px; }
    .c7 { background-image: url('images/clouds7.png'); top: 20%; left: 40%; width: 150px; height: 90px; }
    .c8 { background-image: url('images/clouds8.png'); top: 85%; left: 35%; width: 300px; height: 180px; }

    /* UI Elements */
    .container { max-width: 900px; margin: auto; text-align: center; position: relative; z-index: 2; }
    .anya-dance { position: fixed; bottom: 0; right: 0px; width: 200px; z-index: 1000; pointer-events: none; }
    .header-img { width: 100%; max-width: 400px; margin-bottom: 20px; }
    h2 { color: var(--light-pink); text-transform: uppercase; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; margin: 10px 0; }

    /* Search & Table Styles */
    .search-area { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    input { padding: 12px; border: 2px solid var(--black); border-radius: 8px; width: 300px; }
    button { padding: 10px 20px; background-color: var(--pastel-pink); border: 2px solid var(--black); border-radius: 8px; font-weight: bold; cursor: pointer; }

    table { width: 100%; border-collapse: collapse; background: white; border: 2px solid var(--black); }
    th { background-color: var(--pastel-pink); padding: 10px; border: 1px solid var(--black); text-transform: uppercase; font-size: 0.8em; }
    td { padding: 10px; border: 1px solid #ddd; text-align: center; }

    /* Animations */
    @keyframes flyLeftToRight { 0% { left: -150px; } 100% { left: 105vw; } }
    @keyframes flyRightToLeft { 0% { left: 105vw; } 100% { left: -150px; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    .flying-img { position: absolute; width: 100px; z-index: 1; pointer-events: none; animation: flyLeftToRight 15s linear infinite, bounce 2s ease-in-out infinite; }
    .fly-reverse { animation: flyRightToLeft 15s linear infinite, bounce 2s ease-in-out infinite; }
  </style>
</head>
